<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 8px;
        }
        .title {
            font-size: 18px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h1>My Certificates</h1>

<div class="grid">

    <div class="card">
        <div class="title">Life Sciences: Biology Research Simulation</div>
        <iframe src="lifearccert.pdf"></iframe>
    </div>

    <div class="card">
        <div class="title">Chemistry Job Simulation</div>
        <iframe src="lifearcchemcert.pdf"></iframe>
    </div>

    <div class="card">
        <div class="title">Molecule to Market Job Simulation</div>
        <iframe src="pfizercert.pdf"></iframe>
    </div>

</div>

</body>
</html>
